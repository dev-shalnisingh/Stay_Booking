<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Register Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:url("./imag.avif") center/cover no-repeat fixed;
}

.container{
    width:100%;
    max-width:600px;
    padding:30px;

    border-radius:20px;

    background: radial-gradient(
        circle,
        rgba(238,174,202,1) 0%,
        rgba(148,187,233,1) 100%
    );
}

h1{
    font-size:1.3rem;
    margin-bottom:8px;
}

input{
    width:100%;
    height:50px;
    border:2px solid black;
    border-radius:17px;
    padding:0 15px;
    margin-bottom:15px;
    font-size:1rem;
}

input:hover{
    background:white;
    color:black;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:17px;
    background:blue;
    color:white;
    font-size:1.2rem;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}

h4{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:blue;
    font-weight:bold;
}

/* Tablet */
@media (max-width:768px){
    .container{
        padding:25px;
    }
}

/* Mobile */
@media (max-width:480px){

    .container{
        padding:20px;
    }

    h1{
        font-size:1rem;
    }

    input,
    button{
        height:45px;
        font-size:0.9rem;
    }

    h4{
        font-size:0.85rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <form>

        <h1>User Name</h1>
        <input type="text" placeholder="YOUR NAME">

        <h1>Email Address</h1>
        <input type="email" placeholder="YOUR EMAIL">

        <h1>Password</h1>
        <input type="password" placeholder="**********">

        <button type="submit">Register</button>

        <h4>
            Already have an account?
            <a href="login.html">Login Here</a>
        </h4>

    </form>
</div>

</body>
</html>
