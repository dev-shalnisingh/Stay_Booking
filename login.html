<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("./houseimage.avif") center/cover no-repeat;
    padding:20px;
}

#box{
    width:450px;
    max-width:100%;
    padding:30px;
    border:2px solid white;
    background-color:rgba(11,11,11,0.3);
    border-radius:17px;
}

h1{
    color:white;
    font-size:1.5rem;
    margin-bottom:10px;
}

input{
    width:100%;
    height:45px;
    border:2px solid white;
    border-radius:17px;
    padding-left:15px;
    font-size:1rem;
    margin-bottom:20px;
}

#box1{
    width:100%;
    height:45px;
    background-color:blue;
    border-radius:17px;
    color:white;
    font-size:1.2rem;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

/* Tablet */
@media (max-width:768px){
    #box{
        width:80%;
    }

    h1{
        font-size:1.3rem;
    }
}

/* Mobile */
@media (max-width:480px){
    #box{
        width:100%;
        padding:20px;
    }

    h1{
        font-size:1.1rem;
    }

    input{
        height:40px;
    }

    #box1{
        height:40px;
        font-size:1rem;
    }
}
</style>
</head>
<body>

<div id="box">
    <form>
        <h1>Email Id</h1>
        <input type="email" placeholder="Email Id">

        <h1>Password</h1>
        <input type="password" placeholder="Password">

        <div id="box1">SUBMIT</div>
    </form>
</div>

</body>
</html>
